<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">Oshida Smartphone CAD screen state flow</title>
  <desc id="desc">Part editing, output panels, three-dimensional preview, and assembly mode transitions.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px sans-serif; fill: #111827; }
      .subtitle { font: 400 14px sans-serif; fill: #64748b; }
      .section { font: 700 18px sans-serif; fill: #0f172a; }
      .label { font: 700 16px sans-serif; fill: #0f172a; }
      .body { font: 400 13px sans-serif; fill: #334155; }
      .small { font: 400 12px sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 8; }
      .part { fill: #e8f1ff; }
      .preview { fill: #e9f8ef; }
      .panel { fill: #fff7df; }
      .assembly { fill: #f5edff; }
      .modal { fill: #fff0f0; }
      .line { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 6; }
    </style>
  </defs>

  <rect width="1200" height="920" fill="#ffffff"/>
  <text x="48" y="48" class="title">画面状態遷移</text>
  <text x="48" y="73" class="subtitle">単品部品、保存・出力、3Dプレビュー、アセンブリの主要な画面状態</text>

  <rect x="450" y="96" width="300" height="64" class="box part"/>
  <text x="600" y="122" text-anchor="middle" class="label">起動</text>
  <text x="600" y="145" text-anchor="middle" class="body">localStorageを復元して単品部品モードへ</text>

  <rect x="60" y="205" width="430" height="250" class="box part"/>
  <text x="82" y="235" class="section">単品部品モード</text>
  <rect x="88" y="258" width="176" height="72" class="box part"/>
  <text x="176" y="285" text-anchor="middle" class="label">面編集</text>
  <text x="176" y="308" text-anchor="middle" class="body">上面 / 正面 / 右側面</text>
  <rect x="286" y="258" width="176" height="72" class="box part"/>
  <text x="374" y="285" text-anchor="middle" class="label">図形編集</text>
  <text x="374" y="308" text-anchor="middle" class="body">選択、add/cut、寸法</text>
  <rect x="88" y="357" width="176" height="72" class="box preview"/>
  <text x="176" y="384" text-anchor="middle" class="label">面拡大</text>
  <text x="176" y="407" text-anchor="middle" class="body">面をダブルタップ</text>
  <rect x="286" y="357" width="176" height="72" class="box preview"/>
  <text x="374" y="384" text-anchor="middle" class="label">3D操作</text>
  <text x="374" y="407" text-anchor="middle" class="body">3面ロック後に利用可能</text>
  <path d="M264 294 H286" class="line"/>
  <path d="M176 330 V357" class="line"/>
  <path d="M374 330 V357" class="line"/>
  <path d="M286 393 H264" class="dash"/>
  <text x="275" y="448" text-anchor="middle" class="small">タップで選択、再ダブルタップで通常表示</text>

  <rect x="710" y="205" width="430" height="250" class="box assembly"/>
  <text x="732" y="235" class="section">アセンブリモード</text>
  <rect x="738" y="258" width="176" height="72" class="box assembly"/>
  <text x="826" y="285" text-anchor="middle" class="label">3D全体表示</text>
  <text x="826" y="308" text-anchor="middle" class="body">初期フォーカス / 視点回転</text>
  <rect x="936" y="258" width="176" height="72" class="box assembly"/>
  <text x="1024" y="285" text-anchor="middle" class="label">部品配置</text>
  <text x="1024" y="308" text-anchor="middle" class="body">web保存部品を追加</text>
  <rect x="738" y="357" width="176" height="72" class="box preview"/>
  <text x="826" y="384" text-anchor="middle" class="label">投影面</text>
  <text x="826" y="407" text-anchor="middle" class="body">上面 / 正面 / 右側面</text>
  <rect x="936" y="357" width="176" height="72" class="box assembly"/>
  <text x="1024" y="384" text-anchor="middle" class="label">部品編集</text>
  <text x="1024" y="407" text-anchor="middle" class="body">XYZ位置、90度回転、色</text>
  <path d="M914 294 H936" class="line"/>
  <path d="M826 330 V357" class="line"/>
  <path d="M1024 330 V357" class="line"/>
  <path d="M936 393 H914" class="dash"/>
  <text x="925" y="448" text-anchor="middle" class="small">各画面はダブルタップで拡大 / 復帰</text>

  <path d="M600 160 V185 H275 V205" class="line"/>
  <path d="M490 225 C580 185, 620 185, 710 225" class="line"/>
  <text x="600" y="196" text-anchor="middle" class="small">☰ アセンブリ（開発中）</text>
  <path d="M710 246 C620 285, 580 285, 490 246" class="dash"/>
  <text x="600" y="277" text-anchor="middle" class="small">☰ 単品部品</text>

  <rect x="60" y="525" width="760" height="218" class="box panel"/>
  <text x="82" y="555" class="section">単品部品の下部パネル切替</text>
  <rect x="88" y="582" width="154" height="72" class="box panel"/>
  <text x="165" y="609" text-anchor="middle" class="label">保存</text>
  <text x="165" y="632" text-anchor="middle" class="body">JSON / STL / STEP</text>
  <rect x="264" y="582" width="154" height="72" class="box panel"/>
  <text x="341" y="609" text-anchor="middle" class="label">呼び出し</text>
  <text x="341" y="632" text-anchor="middle" class="body">web保存データ</text>
  <rect x="440" y="582" width="154" height="72" class="box panel"/>
  <text x="517" y="609" text-anchor="middle" class="label">ヘルプ</text>
  <text x="517" y="632" text-anchor="middle" class="body">操作手順とロック条件</text>
  <rect x="616" y="582" width="176" height="72" class="box modal"/>
  <text x="704" y="609" text-anchor="middle" class="label">画面リセット確認</text>
  <text x="704" y="632" text-anchor="middle" class="body">はい / いいえ</text>
  <text x="88" y="691" class="body">保存・呼び出し・ヘルプは、プレビュー右上のハンバーガーメニューから開く。</text>
  <text x="88" y="716" class="body">パネルを開くと図形編集または3D操作UIを置き換え、面や3Dを選ぶと編集へ戻る。</text>
  <path d="M275 455 V495 H180 V525" class="line"/>
  <path d="M235 525 V480 H330 V455" class="dash"/>

  <rect x="860" y="525" width="280" height="218" class="note"/>
  <text x="882" y="556" class="section">状態を決める主な値</text>
  <text x="882" y="590" class="body">appMode: part / assembly</text>
  <text x="882" y="618" class="body">activeFace: top / front / right</text>
  <text x="882" y="646" class="body">viewMode: faces / 3d</text>
  <text x="882" y="674" class="body">outputOpen + outputFormat</text>
  <text x="882" y="702" class="body">fullPreviewFace / fullAssemblyPreview</text>

  <rect x="60" y="790" width="1080" height="82" class="note"/>
  <text x="82" y="820" class="label">選択状態</text>
  <text x="82" y="846" class="body">プレビュー上の図形または部品をタップすると selectedId / selectedAssemblyId が更新され、下部UIが該当エディタまでスクロールする。</text>
</svg>
